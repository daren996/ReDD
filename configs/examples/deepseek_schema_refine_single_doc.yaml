config_version: 2.1.1

project:
  name: deepseek-schema-refine-single-doc
  seed: 42

runtime:
  output_dir: outputs/deepseek_fastredd_try/schema_refine_single_doc
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-schema-refine-v1
  console_log_level: WARNING
  force_rerun: true

models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 512
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null

datasets:
  examples.single_doc_demo:
    loader: hf_manifest
    root: dataset/canonical/examples.single_doc_demo
    query_ids: [Q1]
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  preprocessing:
    enabled: true
    prompt: schemagen_4_0
    output_fields:
      res: Assignment
      log: Updated Record of Schema
      reason: Reasoning
    options:
      result_save_interval: 1
  schema_refinement:
    enabled: true
    source_stage: preprocessing
    prompt:
      prompt_path: prompts/schemagen_5_0.txt
    output_fields:
      res: Assignment
      log: Updated Record of Schema
      reason: Reasoning
    options:
      result_save_interval: 1

experiments:
  demo:
    datasets: [examples.single_doc_demo]
    stages: [preprocessing, schema_refinement]
    artifact_id: deepseek-schema-refine-v1
