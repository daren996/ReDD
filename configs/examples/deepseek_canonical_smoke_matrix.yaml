stages:
  preprocessing:
    enabled: true
    prompt: schemagen_4_0
    output_fields:
      res: Assignment
      log: Updated Record of Schema
      reason: Reasoning
    options:
      result_save_interval: 1
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: prompts/data_extraction_table_json.txt
      prompt_attr: prompts/data_extraction_attr_json.txt
    options:
      force_rerun: true
      result_save_interval: 1
