config_version: 2.1.1

project:
  name: redd-web-demo
  seed: 42

runtime:
  output_dir: outputs/doc_filter_predicate_proxy_eval
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: doc-filter-predicate-proxy-heuristic-v1
  console_log_level: WARNING

models:
  llm:
    provider: none
    model: ground_truth
  embedding:
    enabled: true
    provider: local
    model: local-hash-embedding
    api_key_env: null
    storage_file: embeddings.sqlite3

datasets:
  spider.college_demo:
    loader: hf_manifest
    root: dataset/derived/spider.college_demo
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

  bird.schools_demo:
    loader: hf_manifest
    root: dataset/derived/bird.schools_demo
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: ground_truth
    document_filtering:
      enabled: true
      filter_type: schema_relevance
      enable_calibrate: false
      threshold: 0.585
      embedding_model: local-hash-embedding
    proxy_runtime:
      enabled: true
      predicate_proxy_mode: pretrained
      use_embedding_proxies: false
      use_learned_proxies: true
      use_finetuned_learned_proxies: true
      use_join_resolution: false
      finetuned_model: heuristic
      finetuned_epochs: 0
      proxy_threshold: 0.51
      heuristic_pass_through_attributes: [num_tst_takr]
      allow_embedding_fallback: false
      save_hard_negatives: false
      verbose: true
    alpha_allocation:
      enabled: false
    options:
      force_rerun: false

experiments:
  demo:
    datasets:
      - spider.college_demo
      - bird.schools_demo
    stages: [data_extraction]
