config_version: 2.1.1
project:
  name: deepseek-query-curation-baseline
  seed: 42
runtime:
  output_dir: outputs/deepseek_query_curation
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-query-curation-baseline-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 1024
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  bird.schools_demo:
    loader: hf_manifest
    root: dataset/derived/bird.schools_demo
    query_ids:
    - Q_gen_satscores_avg_scr_math_020_506_0
    - Q_gen_satscores_avg_scr_read_040_443_0
    - Q_gen_satscores_enroll12_080_450
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 25
      strategy: prefix
  fda.fda.no_chunk:
    loader: hf_manifest
    root: dataset/derived/fda.fda.no_chunk
    query_ids:
    - Q_gen_fda_510k_device_submission_applicant_003_luminex_corporation
    - Q_gen_fda_510k_device_submission_product_code_010_jwy_manual_antimicro
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 25
      strategy: prefix
  galois.premierleague.default_task:
    loader: hf_manifest
    root: dataset/derived/galois.premierleague.default_task
    query_ids:
    - Q_gen_match_result_home_team_040_arsenal_brentford
    - Q_gen_match_result_home_goals_080_2
    - Q_gen_match_result_away_goals_100_6
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 25
      strategy: prefix
  spider.college_demo:
    loader: hf_manifest
    root: dataset/derived/spider.college_demo
    query_ids:
    - Q_gen_teaches_instructor_name_010_kean_dagostino_l
    - Q_gen_teaches_instructor_name_020_kean_dagostino_l
    - Q_gen_course_credits_040_4_3
    - Q_gen_instructor_all_100_all
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 25
      strategy: prefix
stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: prompts/data_extraction_table_json.txt
      prompt_attr: prompts/data_extraction_attr_json.txt
    options:
      force_rerun: true
      result_save_interval: 1
      eval:
        mode: deepseek
        llm_model: deepseek-chat
        structured_backend: json
        max_retries: 2
        wait_time: 1
        prompts:
          data_extraction_cmp_str: prompts/eval_data_extraction_cmp_str.txt
experiments:
  demo:
    datasets:
    - bird.schools_demo
    - fda.fda.no_chunk
    - galois.premierleague.default_task
    - spider.college_demo
    stages:
    - data_extraction
    artifact_id: deepseek-query-curation-baseline-v1
