# Unified Schema Generation + Data Population config
# Use the same exp name for both scripts:
#   python scripts/main_preprocessing.py --config configs/siliconflow_qwen30B.yaml --exp wine_reddv0
#   python scripts/main_schema_refinement.py --config configs/siliconflow_qwen30B.yaml --exp wine_reddv0
#   python scripts/main_datapop.py --config configs/siliconflow_qwen30B.yaml --exp wine_reddv0

training_data_count: 100

default_shared: &default_shared
  # mode: "siliconflow"
  # llm_model: "Qwen/Qwen3-30B-A3B-Instruct-2507"
  mode: "ground_truth"
  console_log_level: "WARNING"
  data_loader_type: "sqlite"
  shuffle_documents: false
  exp_query_id_list: null
  output_layout: "module_under_task"  # outputs/<benchmark>/<dataset_task>/<module>

schema_gen_defaults: &schema_gen_defaults
  in_fields:
    doc: "Document"
    log: "Record of Schema"
  out_fields:
    res: "Assignment"
    log: "Updated Record of Schema"
    reason: "Reasoning"
  prompt:
    prompt_path: "prompts/schemagen_5_0.txt"
    prompt_version: "5d0"
  adaptive_sampling:
    enabled: false

data_pop_defaults: &data_pop_defaults
  prompts:
    prompt_table: "prompts/datapop_table_json.txt"
    prompt_attr: "prompts/datapop_attr_json.txt"
  eval:
    # mode: "deepseek"
    # llm_model: "deepseek-chat"
    mode: "ground_truth"
    prompts:
      datapop_cmp_str: "prompts/eval_datapop_cmp_str.txt"
  classifier_threshold: 0.5
  chunk_filtering:
    enabled: false
    only: false
    target_recall: 0.95
    enable_calibrate: true
    embedding_model: "text-embedding-3-small"

ccg_pretrained_defaults: &ccg_pretrained_defaults
  ccg: &ccg_pretrained_default_cfg
    enabled: true
    min_training_data: 0
    min_calibration_data: 10
    use_embedding_guards: true
    use_learned_guards: true
    use_finetuned_learned_guards: true
    target_recall: 0.95
    embedding_model: "text-embedding-3-small"
    save_hard_negatives: false
    verbose: true
    use_join_guard: true
    join_guard_extractor: "llm"
    use_table_relevant_for_training: true
    guard_train_ratio: 0.8
    finetuned_model: "models/pretrained_guards/gliclass_spider_100/final_model"
    finetuned_epochs: 0
    finetuned_learning_rate: 2.0e-5
    use_gliclass_icl: false
    gliclass_icl_examples_per_class: 3

# ==== Spider: Wine ===========================================================
wine_shared: &wine_shared
  <<: *default_shared
  doc_table_mapping_mode: "1to1"
  data_main: "dataset/spider_sqlite/"
  exp_dataset_task: "wine_1/gt_schema_task"
  schema_param_str: &wine_schema_param "mdlqwen330b2507_prm5d0_reddv0"

wine_reddv0:
  <<: *wine_shared
  schema_gen:
    <<: *schema_gen_defaults
    out_main: "outputs/spider/"
    res_param_str: *wine_schema_param
  data_pop:
    <<: *data_pop_defaults
    out_main: "outputs/spider/"
    res_param_str: "mdlqwen330b2507_reddv0"
    schemagen:
      out_main: "outputs/spider/"
      param_str: *wine_schema_param

wine_gt_schema_test:
  <<: *wine_shared
  data_pop:
    <<: *data_pop_defaults
    out_main: "outputs/spider/"
    res_param_str: "gt_schema_test"
    schema_source: "ground_truth"

single_doc_demo_gt:
  training_data_count: 0
  data_main: "dataset/examples_sqlite/"
  exp_dataset_task: "single_doc_demo/gt_schema_task"
  data_pop:
    mode: "ground_truth"
    out_main: "outputs/examples/"
    res_param_str: "single_doc_gt"
    schema_source: "ground_truth"

wine_ccg_pretrained:
  <<: *wine_shared
  schema_gen:
    <<: *schema_gen_defaults
    out_main: "outputs/spider/"
    res_param_str: *wine_schema_param
  data_pop:
    <<: [*data_pop_defaults, *ccg_pretrained_defaults]
    out_main: "outputs/spider/"
    res_param_str: "ccg_pretrained"
    schemagen:
      out_main: "outputs/spider/"
      param_str: *wine_schema_param

wine_datapop_common: &wine_datapop_common
  <<: [*data_pop_defaults, *ccg_pretrained_defaults]
  out_main: "outputs/spider/"
  schemagen:
    out_main: "outputs/spider/"
    param_str: *wine_schema_param

wine_ccg: &wine_ccg
  <<: *wine_shared
  schema_gen:
    <<: *schema_gen_defaults
    out_main: "outputs/spider/"
    res_param_str: *wine_schema_param
  data_pop:
    <<: *wine_datapop_common
    res_param_str: "ccg"
    chunk_filtering:
      enabled: false
      only: false
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: "text-embedding-3-small"

wine_cf:
  <<: *wine_shared
  schema_gen:
    <<: *schema_gen_defaults
    out_main: "outputs/spider/"
    res_param_str: *wine_schema_param
  data_pop:
    <<: *wine_datapop_common
    res_param_str: "cf"
    ccg:
      enabled: false
    chunk_filtering:
      enabled: true
      only: false
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: "text-embedding-3-small"

wine_cf_ccg: &wine_cf_ccg
  <<: *wine_shared
  schema_gen:
    <<: *schema_gen_defaults
    out_main: "outputs/spider/"
    res_param_str: *wine_schema_param
  data_pop:
    <<: *wine_datapop_common
    res_param_str: "cf_ccg"
    chunk_filtering:
      enabled: true
      only: false
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: "text-embedding-3-small"

wine_cf_ccg_al:
  <<: *wine_shared
  schema_gen:
    <<: *schema_gen_defaults
    out_main: "outputs/spider/"
    res_param_str: *wine_schema_param
  data_pop:
    <<: *wine_datapop_common
    res_param_str: "cf_ccg_al"
    chunk_filtering:
      enabled: true
      only: false
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: "text-embedding-3-small"
    alpha_allocation:
      enabled: true
      target_recall: 0.95
      alpha_grid: [0.0, 0.005, 0.01, 0.02, 0.03, 0.05]

