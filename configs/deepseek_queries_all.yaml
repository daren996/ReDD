config_version: 2.1.1
project:
  name: deepseek-materialized-full-extraction-queries-all
  seed: 42
runtime:
  output_dir: outputs/materialized_full_extraction_all
  log_dir: outputs/logs
  output_layout: dataset_stage
  artifact_id: deepseek-materialized-full-extraction-all-v1
  console_log_level: WARNING
  materialized_full_extraction: true
  materialized_full_extraction_only: false
  materialized_full_extraction_batch_size: 16
  materialized_full_extraction_batch_max_chars: 24000
  materialized_full_extraction_concurrency: 4
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: auto
    max_retries: 5
    wait_time: 10

datasets:
  spider.apartment_rentals.default_task:
    loader: hf_manifest
    root: dataset/derived/spider.apartment_rentals.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  spider.bike_1.default_task:
    loader: hf_manifest
    root: dataset/derived/spider.bike_1.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  spider.college_2.course_teaches_instructor:
    loader: hf_manifest
    root: dataset/derived/spider.college_2.course_teaches_instructor
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  spider.flight_4.routes_airports_airlines:
    loader: hf_manifest
    root: dataset/derived/spider.flight_4.routes_airports_airlines
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  spider.soccer_1.default_task:
    loader: hf_manifest
    root: dataset/derived/spider.soccer_1.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  spider.wine_1.wine_appellations:
    loader: hf_manifest
    root: dataset/derived/spider.wine_1.wine_appellations
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  bird.california_schools.default_task:
    loader: hf_manifest
    root: dataset/derived/bird.california_schools.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  bird.debit_card_specializing.default_task:
    loader: hf_manifest
    root: dataset/derived/bird.debit_card_specializing.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  bird.student_club.default_task:
    loader: hf_manifest
    root: dataset/derived/bird.student_club.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  galois.fortune.default_task:
    loader: hf_manifest
    root: dataset/derived/galois.fortune.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  galois.premierleague.default_task:
    loader: hf_manifest
    root: dataset/derived/galois.premierleague.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    options:
      result_save_interval: 1000000
      eval:
        mode: deepseek
        llm_model: deepseek-chat
        structured_backend: json
        max_retries: 2
        wait_time: 1
        request_timeout: 60
        full_table_semantic: false
        semantic_context:
          enabled: true
          include_schema: true
          include_query: true
          include_cell_role: true
          include_doc_text: on_mismatch
          doc_text_max_chars: 1200
        prompts:
          data_extraction_cmp_str: data_extraction_cmp_str

experiments:
  materialized_queries_all:
    datasets:
    - spider.apartment_rentals.default_task
    - spider.bike_1.default_task
    - spider.college_2.course_teaches_instructor
    - spider.flight_4.routes_airports_airlines
    - spider.soccer_1.default_task
    - spider.wine_1.wine_appellations
    - bird.california_schools.default_task
    - bird.debit_card_specializing.default_task
    - bird.student_club.default_task
    - galois.fortune.default_task
    - galois.premierleague.default_task
    stages:
    - data_extraction
