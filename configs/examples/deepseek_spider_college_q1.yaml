config_version: 2.1.1

project:
  name: deepseek-spider-college-q1
  seed: 42

runtime:
  output_dir: outputs/deepseek_fastredd_try/college_q1
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-college-q1-v1
  console_log_level: WARNING
  force_rerun: true

models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 256
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null

datasets:
  spider.college_demo:
    loader: hf_manifest
    root: dataset/derived/spider.college_demo
    query_ids: [q1]
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: data_extraction_table
      prompt_attr: data_extraction_attr
    options:
      force_rerun: true
      result_save_interval: 10

experiments:
  demo:
    datasets: [spider.college_demo]
    stages: [data_extraction]
    artifact_id: deepseek-college-q1-v1
