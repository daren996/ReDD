config_version: 2.1.1
project:
  name: deepseek-full-canonical-alpha
  seed: 42
runtime:
  output_dir: outputs/deepseek_full_canonical_alpha
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-full-canonical-alpha-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    request_timeout: 60
    temperature: 0
    max_tokens: 1024
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  bird.california_schools:
    loader: hf_manifest
    root: dataset/canonical/bird.california_schools
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 25
      strategy: prefix
  bird.debit_card_specializing:
