config_version: 2.1.1
project:
  name: deepseek-alpha-goal-semantic-more-alpha
  seed: 42
runtime:
  output_dir: outputs/deepseek_alpha_goal_semantic_more
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-alpha-goal-semantic-more-alpha-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 1024
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  deepseek_ablation_multi.bird_california_schools:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_multi/bird_california_schools
    query_ids: [Q_bird_california_schools_1, Q_bird_california_schools_2]
    loader_options: {manifest: manifest.yaml}
    split: {train_count: 3, strategy: prefix}
  deepseek_ablation_multi.bird_debit_card:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_multi/bird_debit_card
    query_ids: [Q_bird_debit_card_1, Q_bird_debit_card_2]
    loader_options: {manifest: manifest.yaml}
    split: {train_count: 3, strategy: prefix}
  deepseek_ablation_multi.bird_student_club:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_multi/bird_student_club
    query_ids: [Q_bird_student_club_1, Q_bird_student_club_2]
    loader_options: {manifest: manifest.yaml}
    split: {train_count: 3, strategy: prefix}
  deepseek_ablation_multi.spider_soccer_1:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_multi/spider_soccer_1
    query_ids: [Q_spider_soccer_1_1, Q_spider_soccer_1_2]
    loader_options: {manifest: manifest.yaml}
    split: {train_count: 3, strategy: prefix}
  deepseek_ablation_multi.spider_wine_1:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_multi/spider_wine_1
    query_ids: [Q_spider_wine_1_1, Q_spider_wine_1_2]
    loader_options: {manifest: manifest.yaml}
    split: {train_count: 3, strategy: prefix}
stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: prompts/data_extraction_table_json.txt
      prompt_attr: prompts/data_extraction_attr_json.txt
    options:
      force_rerun: true
      result_save_interval: 1
      eval:
        mode: deepseek
        llm_model: deepseek-chat
        structured_backend: json
        max_retries: 2
        wait_time: 1
        prompts:
          data_extraction_cmp_str: prompts/eval_data_extraction_cmp_str.txt
    doc_filter:
      enabled: true
      filter_type: schema_relevance
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: local-hash-embedding
      embeddings_cache_dir: outputs/deepseek_alpha_goal_semantic_more/_embedding_cache
      threshold: 0.585
      use_source_table_metadata: true
      source_table_metadata_only: false
      source_table_keep_unknown: true
    table_assignment_cache:
      enabled: true
      source_table_metadata: true
      general_schema: true
    proxy_runtime:
      enabled: true
      predicate_proxy_mode: pretrained
      target_recall: 0.95
      use_embedding_proxies: false
      use_learned_proxies: true
      use_finetuned_learned_proxies: true
      finetuned_model: heuristic
      finetuned_epochs: 0
      proxy_threshold: 0.51
      allow_embedding_fallback: false
      use_join_resolution: true
      bidirectional_join_resolution: true
      join_order_strategy: selective_first
      join_empty_short_circuit: true
      cross_query_extraction_cache: true
      cache_extract_full_table: true
      save_hard_negatives: false
      verbose: false
    alpha_allocation:
      enabled: true
      target_recall: 0.95
      alpha_grid: [0.0, 0.005, 0.01, 0.02, 0.03, 0.05, 0.08, 0.1, 0.15, 0.2, 0.3, 0.4, 0.5]
      answer_recall_calibration: true
      answer_recall_calibration_allow_over_budget: true
      answer_recall_calibration_global: true
experiments:
  demo:
    datasets:
      - deepseek_ablation_multi.bird_california_schools
      - deepseek_ablation_multi.bird_debit_card
      - deepseek_ablation_multi.bird_student_club
      - deepseek_ablation_multi.spider_soccer_1
      - deepseek_ablation_multi.spider_wine_1
    stages: [data_extraction]
    artifact_id: deepseek-alpha-goal-semantic-more-alpha-v1
