config_version: 2.1.1
project:
  name: deepseek-ablation-bike-table_metadata_cache
  seed: 42
runtime:
  output_dir: outputs/deepseek_ablation_bike
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-ablation-table_metadata_cache-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 256
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  deepseek_ablation.spider.bike_1:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_bike
    query_ids:
    - Q_end_624
    - Q_start_624
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 5
stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: data_extraction_table
      prompt_attr: data_extraction_attr
    options:
      force_rerun: true
      result_save_interval: 1
    table_assignment_cache:
      enabled: true
      source_table_metadata: true
      general_schema: false
experiments:
  demo:
    datasets:
    - deepseek_ablation.spider.bike_1
    stages:
    - data_extraction
    artifact_id: deepseek-ablation-table_metadata_cache-v1
