config_version: 2.1.1
project:
  name: deepseek-aligned-single-doc-matrix
  seed: 42
runtime:
  output_dir: outputs/deepseek_aligned_matrix
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-aligned-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 2048
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  deepseek_aligned.bird.california_schools:
    loader: hf_manifest
    root: dataset/derived/deepseek_aligned_single_doc_matrix/deepseek_aligned.bird.california_schools
    query_ids:
    - Q_aligned
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
