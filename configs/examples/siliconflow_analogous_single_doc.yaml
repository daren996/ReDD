config_version: 2.1.1

project:
  name: redd-paper-analogous-single-doc-siliconflow
  seed: 42

runtime:
  output_dir: outputs/siliconflow_analogous_single_doc
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: siliconflow-analogous-v1
  console_log_level: INFO
  force_rerun: true

models:
  llm:
    provider: siliconflow
    model: deepseek-ai/DeepSeek-V3
    api_key_env: SILICONFLOW_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 256
  embedding:
    provider: openai
    model: text-embedding-3-small
    enabled: false
    api_key_env: OPENAI_API_KEY

datasets:
  examples.single_doc_demo:
    loader: hf_manifest
    root: dataset/canonical/examples.single_doc_demo
    query_ids: [Q1]
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: data_extraction_table
      prompt_attr: data_extraction_attr
    options:
      force_rerun: true
      result_save_interval: 1

experiments:
  demo:
    datasets: [examples.single_doc_demo]
    stages: [data_extraction]
    artifact_id: siliconflow-analogous-v1
