config_version: 2.1.1
project:
  name: deepseek-materialized-full-extraction-all
  seed: 42
runtime:
  output_dir: outputs/materialized_full_extraction_all
  log_dir: outputs/logs
  output_layout: dataset_stage
  artifact_id: deepseek-materialized-full-extraction-all-v1
  console_log_level: WARNING
  materialized_full_extraction_only: true
  materialized_full_extraction_batch_size: 16
  materialized_full_extraction_batch_max_chars: 24000
  materialized_full_extraction_concurrency: 4
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: auto
    max_retries: 5
    wait_time: 10

datasets:
  spider.apartment_rentals.default_task:
    loader: hf_manifest
    root: dataset/derived/spider.apartment_rentals.default_task
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  spider.bike_1.default_task:
    loader: hf_manifest
    root: dataset/derived/spider.bike_1.default_task
    loader_options:
      manifest: manifest.yaml
    split:
