name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  package-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Lint targeted package surfaces
        run: |
          ruff check \
            src/redd/__init__.py \
            src/redd/api.py \
            src/redd/config.py \
            src/redd/runtime.py \
            src/redd/core/data_population/factory.py \
            src/redd/core/schema_gen/factory.py \
            src/redd/core/utils/prompt_utils.py \
            src/redd/core/llm/providers.py \
            tests

      - name: Type-check targeted package surfaces
        run: mypy

      - name: Build distribution artifacts
        run: python -m build
