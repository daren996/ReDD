config_version: 2.1.1

project:
  name: fastredd-paper-model-qwen3-partial
  seed: 42

runtime:
  output_dir: outputs/fastredd_paper_model_partial/qwen3_single_doc
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: qwen3-30b-a3b-paper-model-v1
  console_log_level: INFO
  force_rerun: true

models:
  llm:
    provider: siliconflow
    model: Qwen/Qwen3-30B-A3B-Instruct-2507
    api_key_env: SILICONFLOW_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: null
    max_tokens: 512
  embedding:
    provider: openai
    model: text-embedding-3-small
    enabled: false
    api_key_env: OPENAI_API_KEY

datasets:
  examples.single_doc_demo:
    loader: hf_manifest
    root: dataset/canonical/examples.single_doc_demo
    query_ids: [Q1]
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: prompts/datapop_table_json.txt
      prompt_attr: prompts/datapop_attr_json.txt
    options:
      force_rerun: true
      result_save_interval: 1

experiments:
  demo:
    datasets: [examples.single_doc_demo]
    stages: [data_extraction]
    artifact_id: qwen3-30b-a3b-paper-model-v1
