config_version: 2.1.1

project:
  name: fastredd-paper-model-gpt5-schema-partial
  seed: 42

runtime:
  output_dir: outputs/fastredd_paper_model_partial/gpt5_schema_single_doc
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: gpt5-schema-paper-model-v1
  console_log_level: INFO
  force_rerun: true

models:
  llm:
    provider: openai
    model: gpt-5
    api_key_env: OPENAI_API_KEY
    structured_backend: json
    max_retries: 1
    wait_time: 1
    temperature: null
    max_tokens: 1024
  embedding:
    provider: openai
    model: text-embedding-3-small
    enabled: false
    api_key_env: OPENAI_API_KEY

datasets:
  examples.single_doc_demo:
    loader: hf_manifest
    root: dataset/canonical/examples.single_doc_demo
    query_ids: [Q1]
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0

stages:
  preprocessing:
    enabled: true
    prompt: schemagen_4_0
    output_fields:
      res: Assignment
      log: Updated Record of Schema
      reason: Reasoning
    options:
      result_save_interval: 1
  schema_refinement:
    enabled: true
    source_stage: preprocessing
    prompt: schemagen_5_0
    output_fields:
      res: Assignment
      log: Updated Record of Schema
      reason: Reasoning
    options:
      result_save_interval: 1

experiments:
  demo:
    datasets: [examples.single_doc_demo]
    stages: [preprocessing, schema_refinement]
    artifact_id: gpt5-schema-paper-model-v1
