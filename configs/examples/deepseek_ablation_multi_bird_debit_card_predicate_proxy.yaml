config_version: 2.1.1
project:
  name: deepseek-ablation-multi-bird_debit_card-predicate_proxy
  seed: 42
runtime:
  output_dir: outputs/deepseek_ablation_multi
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-ablation-multi-bird_debit_card-predicate_proxy-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 256
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  deepseek_ablation_multi.bird_debit_card:
    loader: hf_manifest
    root: dataset/derived/deepseek_ablation_multi/bird_debit_card
    query_ids:
    - Q_bird_debit_card_1
    - Q_bird_debit_card_2
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 3
stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: data_extraction_table
      prompt_attr: data_extraction_attr
    options:
      force_rerun: true
      result_save_interval: 1
      eval:
        mode: deepseek
        llm_model: deepseek-chat
        structured_backend: json
        max_retries: 2
        wait_time: 1
        prompts:
          data_extraction_cmp_str: data_extraction_cmp_str
    proxy_runtime:
      enabled: true
      predicate_proxy_mode: pretrained
      target_recall: 0.95
      use_embedding_proxies: false
      use_learned_proxies: true
      use_finetuned_learned_proxies: true
      finetuned_model: heuristic
      finetuned_epochs: 0
      proxy_threshold: 0.51
      allow_embedding_fallback: false
      use_join_resolution: false
      save_hard_negatives: false
      verbose: true
experiments:
  demo:
    datasets:
    - deepseek_ablation_multi.bird_debit_card
    stages:
    - data_extraction
    artifact_id: deepseek-ablation-multi-bird_debit_card-predicate_proxy-v1
