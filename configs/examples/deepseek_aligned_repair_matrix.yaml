config_version: 2.1.1
project:
  name: deepseek-aligned-repair-matrix
  seed: 42
runtime:
  output_dir: outputs/deepseek_aligned_repair_matrix
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-repair-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 2048
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  deepseek_repair.galois.fortune:
    loader: hf_manifest
    root: dataset/derived/deepseek_aligned_repair_matrix/deepseek_repair.galois.fortune
    query_ids:
    - Q_repair
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  deepseek_repair.quest.lcr:
    loader: hf_manifest
    root: dataset/derived/deepseek_aligned_repair_matrix/deepseek_repair.quest.lcr
    query_ids:
    - Q_repair
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
  deepseek_repair.spider.bike_1:
    loader: hf_manifest
    root: dataset/derived/deepseek_aligned_repair_matrix/deepseek_repair.spider.bike_1
    query_ids:
    - Q_repair
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
stages:
  preprocessing:
    enabled: true
    prompt: schemagen_4_0
    output_fields:
      res: Assignment
      log: Updated Record of Schema
      reason: Reasoning
    options:
      result_save_interval: 1
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: prompts/data_extraction_table_json.txt
      prompt_attr: prompts/data_extraction_attr_json.txt
    options:
      force_rerun: true
      result_save_interval: 1
experiments:
  repair_galois_fortune:
    datasets:
    - deepseek_repair.galois.fortune
    stages:
    - preprocessing
    - data_extraction
    artifact_id: deepseek-repair-v1
  repair_quest_lcr:
    datasets:
    - deepseek_repair.quest.lcr
    stages:
    - preprocessing
    - data_extraction
    artifact_id: deepseek-repair-v1
  repair_spider_bike_1:
    datasets:
    - deepseek_repair.spider.bike_1
    stages:
    - preprocessing
    - data_extraction
    artifact_id: deepseek-repair-v1
