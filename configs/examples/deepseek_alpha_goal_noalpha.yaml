stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: prompts/data_extraction_table_json.txt
      prompt_attr: prompts/data_extraction_attr_json.txt
    options:
      force_rerun: true
      result_save_interval: 1
    doc_filter:
      enabled: true
      filter_type: schema_relevance
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: local-hash-embedding
      embeddings_cache_dir: outputs/deepseek_alpha_goal_smoke/_embedding_cache
      threshold: 0.585
      use_source_table_metadata: true
      source_table_metadata_only: false
      source_table_keep_unknown: true
    table_assignment_cache:
      enabled: true
      source_table_metadata: true
      general_schema: true
    proxy_runtime:
      enabled: true
      predicate_proxy_mode: pretrained
      target_recall: 0.95
      use_embedding_proxies: false
      use_learned_proxies: true
      use_finetuned_learned_proxies: true
      finetuned_model: heuristic
      finetuned_epochs: 0
      proxy_threshold: 0.51
      allow_embedding_fallback: false
      use_join_resolution: true
      bidirectional_join_resolution: true
      join_order_strategy: selective_first
      join_empty_short_circuit: true
      cross_query_extraction_cache: true
      cache_extract_full_table: true
      save_hard_negatives: false
      verbose: false
    alpha_allocation:
      enabled: false
experiments:
  demo:
    datasets:
      - deepseek_smoke.bird.california_schools
      - deepseek_smoke.bird.debit_card_specializing
      - deepseek_smoke.bird.student_club
      - deepseek_smoke.fda.fda
      - deepseek_smoke.galois.fortune
      - deepseek_smoke.galois.premierleague
      - deepseek_smoke.quest.lcr
      - deepseek_smoke.quest.swde_movie
      - deepseek_smoke.quest.swde_university
      - deepseek_smoke.quest.wikitext
      - deepseek_smoke.spider.apartment_rentals
      - deepseek_smoke.spider.bike_1
      - deepseek_smoke.spider.college_2
      - deepseek_smoke.spider.flight_4
      - deepseek_smoke.spider.soccer_1
      - deepseek_smoke.spider.wine_1
    stages: [data_extraction]
    artifact_id: deepseek-alpha-goal-noalpha-v1
