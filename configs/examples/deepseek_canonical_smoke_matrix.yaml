config_version: 2.1.1
project:
  name: deepseek-canonical-smoke-matrix
  seed: 42
runtime:
  output_dir: outputs/deepseek_smoke_matrix
  log_dir: logs
  output_layout: dataset_stage
  artifact_id: deepseek-smoke-v1
  console_log_level: WARNING
  force_rerun: true
models:
  llm:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    structured_backend: json
    max_retries: 2
    wait_time: 1
    temperature: 0
    max_tokens: 2048
  embedding:
    provider: none
    model: none
    enabled: false
    api_key_env: null
datasets:
  deepseek_smoke.bird.california_schools:
    loader: hf_manifest
    root: dataset/derived/deepseek_smoke_matrix/deepseek_smoke.bird.california_schools
    query_ids:
    - Q1
    loader_options:
      manifest: manifest.yaml
    split:
      train_count: 0
