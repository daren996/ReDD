stages:
  data_extraction:
    enabled: true
    schema_source: ground_truth
    oracle: llm
    prompts:
      prompt_table: data_extraction_table
      prompt_attr: data_extraction_attr
    options:
      force_rerun: true
      result_save_interval: 1
      eval:
        mode: deepseek
        llm_model: deepseek-chat
        full_table_semantic: false
        structured_backend: json
        max_retries: 2
        wait_time: 1
        request_timeout: 60
        prompts:
          data_extraction_cmp_str: data_extraction_cmp_str
    doc_filter:
      enabled: true
      filter_type: schema_relevance
      target_recall: 0.95
      enable_calibrate: true
      embedding_model: local-hash-embedding
      embeddings_cache_dir: outputs/deepseek_full_canonical_alpha/_embedding_cache
      threshold: 0.585
      use_source_table_metadata: true
      source_table_metadata_only: false
      source_table_keep_unknown: true
    table_assignment_cache:
      enabled: true
      source_table_metadata: true
      general_schema: true
    proxy_runtime:
      enabled: true
      predicate_proxy_mode: pretrained
      target_recall: 0.95
      use_embedding_proxies: false
      use_learned_proxies: true
      use_finetuned_learned_proxies: true
      finetuned_model: heuristic
      finetuned_epochs: 0
      proxy_threshold: 0.51
      allow_embedding_fallback: false
      use_join_resolution: true
      bidirectional_join_resolution: true
      join_order_strategy: selective_first
      join_empty_short_circuit: true
      cross_query_extraction_cache: true
      cache_extract_full_table: true
      save_hard_negatives: false
      verbose: false
    alpha_allocation:
      enabled: true
      target_recall: 0.95
      alpha_grid:
      - 0.0
      - 0.005
      - 0.01
      - 0.02
      - 0.03
      - 0.05
      - 0.08
      - 0.1
      - 0.15
      - 0.2
      - 0.3
      - 0.4
      - 0.5
      answer_recall_calibration: true
      answer_recall_calibration_allow_over_budget: true
      answer_recall_calibration_global: true
experiments:
  full_canonical:
    datasets:
    - bird.california_schools
    - bird.debit_card_specializing
    - bird.student_club
    - cuad.cuad
    - examples.single_doc_demo
    - fda.fda
    - galois.fortune
    - galois.premierleague
    - quest.lcr
    - quest.swde_movie
    - quest.swde_university
    - quest.wikitext
    - spider.apartment_rentals
    - spider.bike_1
    - spider.college_2
    - spider.flight_4
    - spider.soccer_1
    - spider.wine_1
    stages:
    - data_extraction
    artifact_id: deepseek-full-canonical-alpha-v1
